name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build Linux binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o bin/mediamtx-hls-proxy-linux-amd64 .

      - name: Generate checksum
        if: github.event_name == 'release'
        run: sha256sum bin/mediamtx-hls-proxy-linux-amd64 > bin/mediamtx-hls-proxy-linux-amd64.sha256

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: mediamtx-hls-proxy-linux-amd64
          path: bin/mediamtx-hls-proxy-linux-amd64
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/mediamtx-hls-proxy-linux-amd64
            bin/mediamtx-hls-proxy-linux-amd64.sha256
