name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build release bundles
        run: |
          mkdir -p bin release/linux-amd64 release/windows-amd64

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/mediamtx-hls-proxy-linux-amd64 .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/mediamtx-hls-proxy-windows-amd64.exe .

          cp bin/mediamtx-hls-proxy-linux-amd64 release/linux-amd64/mediamtx-hls-proxy
          cp config.example.json release/linux-amd64/config.example.json

          cp bin/mediamtx-hls-proxy-windows-amd64.exe release/windows-amd64/mediamtx-hls-proxy.exe
          cp config.example.json release/windows-amd64/config.example.json

          tar -C release/linux-amd64 -czf bin/mediamtx-hls-proxy-linux-amd64.tar.gz .
          (cd release/windows-amd64 && zip -r ../../bin/mediamtx-hls-proxy-windows-amd64.zip .)

          sha256sum bin/mediamtx-hls-proxy-linux-amd64.tar.gz > bin/mediamtx-hls-proxy-linux-amd64.tar.gz.sha256
          sha256sum bin/mediamtx-hls-proxy-windows-amd64.zip > bin/mediamtx-hls-proxy-windows-amd64.zip.sha256

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: mediamtx-hls-proxy-build-assets
          path: |
            bin/mediamtx-hls-proxy-linux-amd64.tar.gz
            bin/mediamtx-hls-proxy-linux-amd64.tar.gz.sha256
            bin/mediamtx-hls-proxy-windows-amd64.zip
            bin/mediamtx-hls-proxy-windows-amd64.zip.sha256
            config.example.json
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            bin/mediamtx-hls-proxy-linux-amd64.tar.gz \
            bin/mediamtx-hls-proxy-linux-amd64.tar.gz.sha256 \
            bin/mediamtx-hls-proxy-windows-amd64.zip \
            bin/mediamtx-hls-proxy-windows-amd64.zip.sha256 \
            config.example.json \
            --clobber
