name: Update Go Dependencies

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Update Go modules
        run: |
          go get -u ./...
          go mod tidy

      - name: Verify updated dependencies
        run: |
          go test ./...
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/mediamtx-hls-proxy-linux-amd64 .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/mediamtx-hls-proxy-windows-amd64.exe .

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(deps): update Go dependencies"
          branch: chore/update-go-dependencies
          delete-branch: true
          title: "chore(deps): update Go dependencies"
          body: |
            Automated dependency update generated by GitHub Actions.

            - updates Go modules
            - runs `go test ./...`
            - builds the Linux and Windows binaries
